<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOKA Streamflow Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-blue: #0077cc;
            --bg-gray: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --accent-orange: #ffa500;
        }

        /* ✅ DARK MODE LOGIC ADDED BACK IN */
        body.dark-mode {
            --bg-gray: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #b0b0b0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
            padding: 20px;
        }

        /* ✅ THEME TOGGLE POSITIONING */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid var(--primary-blue);
            background: var(--card-bg);
            color: var(--text-main);
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .chart-container {
            width: 100%;
            height: 250px;
            margin-top: 15px;
            position: relative;
        }

        h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: var(--primary-blue); }
        .big-number { 
            font-size: 2.5rem; 
            font-weight: bold; 
            margin: 10px 0; 
            min-height: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .timestamp {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 5px;
        }
