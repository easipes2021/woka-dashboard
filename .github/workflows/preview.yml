name: Deploy Next.js preview to /docs/woka-next

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd woka-next
          npm install

      - name: Build static Next.js site
        run: |
          cd woka-next
          npm run build

      - name: Copy output to /docs/woka-next
        run: |
          rm -rf docs/woka-next
          mkdir -p docs/woka-next
          cp -r woka-next/out/* docs/woka-next/

      - name: Commit preview files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/woka-next
          git commit -m "Update Next.js preview site" || echo "No changes"
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # ✅ REQUIRED (fixes the error you saw)
    environment:
      name: github-pages

    steps:
      # ✅ REQUIRED (fixes the 400 error)
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Deploy everything in /docs
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        
