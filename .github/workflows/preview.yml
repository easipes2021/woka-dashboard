name: Build Next.js Preview into /docs/woka-next

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd woka-next
          npm install

      - name: Build Next.js site
        run: |
          cd woka-next
          npm run build

      - name: Copy output to docs/woka-next
        run: |
          rm -rf docs/woka-next
          mkdir -p docs/woka-next
          cp -a woka-next/out/. docs/woka-next/

      - name: Commit preview site
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/woka-next
          git commit -m "Update Next.js preview" || echo "No changes to commit"
          git push
