name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd woka-next
          npm install

      - name: Build the site
        run: |
          cd woka-next
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ✅ THIS publishes your "out/" folder as the root of the deployed site
          path: woka-next/out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
