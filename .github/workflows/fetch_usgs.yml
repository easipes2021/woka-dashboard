name: Fetch USGS Data

on:
  workflow_dispatch:        # Manual trigger
  schedule:
    - cron: "0 3 * * *"     # Daily at 3 AM UTC

jobs:
  fetch-usgs:
    runs-on: ubuntu-latest
    env:
      # ✅ Force all JavaScript-based actions to use Node.js 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Check out repository
      # ✅ Node 24–compatible version
      uses: actions/checkout@v4

    - name: Set up Python
      # ✅ Node 24–compatible version
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip requests

    - name: Fetch USGS Data
      env:
        USGS_API_KEY: ${{ secrets.USGS_API_KEY }}
      run: |
        python scripts/fetch_usgs_data.py

    - name: Commit updated data
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "github-actions"
        git add data/usgs_07195430.json
        git commit -m "Update USGS data" || echo "No changes to commit"

    - name: Push changes
      uses: ad-m/github-push-action@v0.8.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
